<!DOCTYPE html>
<html>
<head>
  <title>Triangle Football Lab v2</title>
</head>

<body style="margin:0; background:#0b0f0d; color:white; font-family:Arial; text-align:center;">

<h2>⚽ Triangle Football Lab (Clean 22 Engine)</h2>

<div>
  Blue: <b id="blue">0</b> | Red: <b id="red">0</b>
</div>

<button onclick="startGame()">Start</button>
<button onclick="resetGame()">Reset</button>

<canvas id="c" width="900" height="500" style="display:block; margin:10px auto;"></canvas>

<script>

// =====================
// CANVAS
// =====================
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// =====================
// FORMATION TEMPLATE (4-3-3)
// =====================
const FORMATION = {
  blue: [
    {x:100,y:80},{x:100,y:160},{x:100,y:240},{x:100,y:320}, // 4 DEF
    {x:220,y:120},{x:220,y:240},{x:220,y:360},              // 3 MID
    {x:340,y:100},{x:340,y:180},{x:340,y:260},{x:340,y:340} // 4 ATT
  ],
  red: [
    {x:800,y:80},{x:800,y:160},{x:800,y:240},{x:800,y:320},
    {x:680,y:120},{x:680,y:240},{x:680,y:360},
    {x:560,y:100},{x:560,y:180},{x:560,y:260},{x:560,y:340}
  ]
};

// =====================
// WORLD
// =====================
const World = {

  players: [],

  ball: {
    x:450,
    y:250,
    vx:0,
    vy:0,
    owner:null,

    update(){
      if(this.owner){
        this.x = this.owner.x;
        this.y = this.owner.y;
      } else {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.98;
        this.vy *= 0.98;
      }
    },

    reset(){
      this.x = 450;
      this.y = 250;
      this.vx = 0;
      this.vy = 0;
      this.owner = null;
    }
  }
};

// =====================
// GAME STATE
// =====================
const Game = {
  blue:0,
  red:0,

  goal(team){
    if(team==="blue") Game.blue++;
    if(team==="red") Game.red++;

    document.getElementById("blue").innerText = Game.blue;
    document.getElementById("red").innerText = Game.red;

    resetPositions();
  }
};

// =====================
// INIT PLAYERS (22 CLEAN)
// =====================
function initPlayers(){
  World.players = [];

  FORMATION.blue.forEach(p=>{
    World.players.push({
      x:p.x,y:p.y,
      team:"blue"
    });
  });

  FORMATION.red.forEach(p=>{
    World.players.push({
      x:p.x,y:p.y,
      team:"red"
    });
  });
}

// =====================
// RESET POSITIONS
// =====================
function resetPositions(){
  initPlayers();
  World.ball.reset();
}

// =====================
// PHYSICS
// =====================
const Physics = {

  goalLock:false,

  update(){

    World.ball.update();

    World.players.forEach(p=>{

      const dx = p.x - World.ball.x;
      const dy = p.y - World.ball.y;
      const dist = Math.hypot(dx,dy);

      if(dist < 14 && !World.ball.owner){
        World.ball.owner = p;
      }

      if(World.ball.owner === p && dist > 25){
        World.ball.owner = null;
      }
    });

    if(!this.goalLock){

      if(World.ball.x > 880){
        this.goalLock = true;
        Game.goal("blue");
        setTimeout(()=>this.goalLock=false,500);
      }

      if(World.ball.x < 20){
        this.goalLock = true;
        Game.goal("red");
        setTimeout(()=>this.goalLock=false,500);
      }
    }
  }
};

// =====================
// RENDER PITCH
// =====================
function drawPitch(){

  ctx.fillStyle = "#145c2c";
  ctx.fillRect(0,0,900,500);

  ctx.strokeStyle = "white";
  ctx.beginPath();
  ctx.moveTo(450,0);
  ctx.lineTo(450,500);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(450,250,60,0,Math.PI*2);
  ctx.stroke();
}

// =====================
// DRAW
// =====================
function draw(){

  drawPitch();

  World.players.forEach(p=>{
    ctx.fillStyle = p.team === "blue" ? "#4dd2ff" : "#ff4d4d";
    ctx.beginPath();
    ctx.arc(p.x,p.y,8,0,Math.PI*2);
    ctx.fill();
  });

  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(World.ball.x,World.ball.y,6,0,Math.PI*2);
  ctx.fill();
}

// =====================
// LOOP
// =====================
let running=false;

function loop(){
  if(!running) return;

  Physics.update();
  draw();

  requestAnimationFrame(loop);
}

// =====================
// CONTROLS
// =====================
function startGame(){
  if(running) return;
  running=true;
  loop();
}

function resetGame(){
  Game.blue=0;
  Game.red=0;

  document.getElementById("blue").innerText=0;
  document.getElementById("red").innerText=0;

  resetPositions();
}

// =====================
// START
// =====================
initPlayers();

</script>

</body>
</html>
