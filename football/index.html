<!DOCTYPE html>
<html>
<head>
  <title>AI Football Engine v3 - Professional Simulation</title>
</head>

<body style="margin:0; background:#0b0f0d; color:white; font-family:Arial; text-align:center;">

<h2>⚽ AI Football Engine v3 (Professional Simulation Core)</h2>

<div>
  Blue: <b id="blue">0</b> | Red: <b id="red">0</b>
</div>

<button onclick="start()">Start</button>
<button onclick="reset()">Reset</button>

<canvas id="c" width="900" height="500" style="display:block; margin:10px auto;"></canvas>

<script>

// ======================
// CORE STATE
// ======================
const Game = { blue:0, red:0 };

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ======================
// BALL
// ======================
const Ball = {
  x:450, y:250,
  vx:0, vy:0,
  owner:null,

  update(){
    if(this.owner){
      this.x = this.owner.x;
      this.y = this.owner.y;
    } else {
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.94;
      this.vy *= 0.94;
    }
  },

  reset(){
    this.x=450; this.y=250;
    this.vx=0; this.vy=0;
    this.owner=null;
  }
};

// ======================
// FORMATIONS (4-3-3 + GK)
// ======================
const FORMATION = {
  blue: [
    {x:60,y:250,role:"gk"},

    {x:150,y:120,role:"def"},
    {x:150,y:200,role:"def"},
    {x:150,y:300,role:"def"},
    {x:150,y:380,role:"def"},

    {x:300,y:150,role:"mid"},
    {x:300,y:250,role:"mid"},
    {x:300,y:350,role:"mid"},

    {x:420,y:150,role:"att"},
    {x:420,y:250,role:"att"},
    {x:420,y:350,role:"att"}
  ],

  red: [
    {x:840,y:250,role:"gk"},

    {x:750,y:120,role:"def"},
    {x:750,y:200,role:"def"},
    {x:750,y:300,role:"def"},
    {x:750,y:380,role:"def"},

    {x:600,y:150,role:"mid"},
    {x:600,y:250,role:"mid"},
    {x:600,y:350,role:"mid"},

    {x:480,y:150,role:"att"},
    {x:480,y:250,role:"att"},
    {x:480,y:350,role:"att"}
  ]
};

// ======================
// PLAYERS
// ======================
const Players = [];

function init(){
  Players.length = 0;

  ["blue","red"].forEach(team=>{
    FORMATION[team].forEach(p=>{
      Players.push({
        x:p.x,
        y:p.y,
        homeX:p.x,
        homeY:p.y,
        team,
        role:p.role,
        speed:1 + Math.random()*0.4
      });
    });
  });
}

// ======================
// UTILS
// ======================
function dist(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

// ======================
// PASSING LOGIC
// ======================
function findPass(p){

  let best=null;
  let bestScore=-999;

  Players.forEach(t=>{
    if(t.team!==p.team) return;

    let score = 0;

    // prefer forward passes
    if(p.team==="blue" && t.x > p.x) score += 5;
    if(p.team==="red" && t.x < p.x) score += 5;

    // distance penalty
    score -= Math.abs(t.x-p.x)*0.01;

    if(score > bestScore && t!==p){
      bestScore = score;
      best = t;
    }
  });

  return best;
}

// ======================
// SHOOTING SYSTEM
// ======================
function shoot(p){

  const goalX = p.team==="blue" ? 900 : 0;
  const power = 4;

  Ball.owner = null;
  Ball.vx = (goalX - p.x) * 0.03;
  Ball.vy = (Math.random()-0.5) * power;
}

// ======================
// AI ENGINE
// ======================
function ai(p){

  const dx = Ball.x - p.x;
  const dy = Ball.y - p.y;
  const d = Math.hypot(dx,dy);

  let targetX = p.homeX;
  let targetY = p.homeY;

  // ======================
  // ROLE BEHAVIOR
  // ======================

  if(p.role==="gk"){
    targetX = p.homeX;
    targetY = Ball.y;
  }

  if(p.role==="def"){
    targetX = p.homeX + (p.team==="blue" ? (Ball.x-450)*0.05 : (Ball.x-450)*0.05);
  }

  if(p.role==="mid"){
    targetX = Ball.x;
    targetY = Ball.y;
  }

  if(p.role==="att"){
    targetX = p.team==="blue" ? Ball.x+60 : Ball.x-60;
    targetY = Ball.y;
  }

  // movement to tactical shape
  p.x += (targetX - p.x) * 0.03 * p.speed;
  p.y += (targetY - p.y) * 0.03 * p.speed;

  // ======================
  // INTERCEPTION
  // ======================
  if(Ball.owner && Ball.owner.team !== p.team && d < 18){
    Ball.owner = p;
  }

  // ======================
  // POSSESSION
  // ======================
  if(d < 14 && !Ball.owner){
    Ball.owner = p;
  }

  // ======================
  // PASS OR SHOOT
  // ======================
  if(Ball.owner === p){

    // shoot condition
    if(Math.abs(p.x - 900) < 120 || Math.abs(p.x - 0) < 120){
      if(p.role==="att" && Math.random()<0.02){
        shoot(p);
        return;
      }
    }

    // passing
    if(Math.random() < 0.02){
      const mate = findPass(p);
      if(mate){
        Ball.owner = null;
        Ball.vx = (mate.x - p.x)*0.06;
        Ball.vy = (mate.y - p.y)*0.06;
      }
    }
  }
}

// ======================
// UPDATE LOOP
// ======================
function update(){

  Ball.update();

  Players.forEach(ai);

  // GOALS
  if(Ball.x > 880){
    Game.blue++;
    document.getElementById("blue").innerText = Game.blue;
    Ball.reset();
  }

  if(Ball.x < 20){
    Game.red++;
    document.getElementById("red").innerText = Game.red;
    Ball.reset();
  }
}

// ======================
// RENDER
// ======================
function draw(){

  ctx.fillStyle="#145c2c";
  ctx.fillRect(0,0,900,500);

  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(450,0);
  ctx.lineTo(450,500);
  ctx.stroke();

  // players
  Players.forEach(p=>{
    ctx.fillStyle = p.team==="blue" ? "#4dd2ff" : "#ff4d4d";
    ctx.beginPath();
    ctx.arc(p.x,p.y,7,0,Math.PI*2);
    ctx.fill();
  });

  // ball
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(Ball.x,Ball.y,6,0,Math.PI*2);
  ctx.fill();
}

// ======================
// LOOP
// ======================
let running=false;

function loop(){
  if(!running) return;

  update();
  draw();

  requestAnimationFrame(loop);
}

// ======================
// CONTROLS
// ======================
function start(){
  if(running) return;
  running=true;
  loop();
}

function reset(){
  Game.blue=0;
  Game.red=0;

  document.getElementById("blue").innerText=0;
  document.getElementById("red").innerText=0;

  Ball.reset();
  init();
}

// ======================
// BOOT
// ======================
init();
draw();

</script>

</body>
</html>
