<!DOCTYPE html>
<html>
<head>
  <title>Triangle Football Lab</title>

  <style>
    body {
      margin: 0;
      background: #0b3d0b;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    canvas {
      background: #1e7f1e;
      display: block;
      margin: auto;
      border: 3px solid white;
    }

    button {
      margin: 5px;
      padding: 8px 14px;
    }
  </style>
</head>

<body>

<h1>Triangle Football Lab</h1>

<div>
  Blue: <span id="blueScore">0</span> |
  Red: <span id="redScore">0</span>
</div>

<button onclick="init()">Start</button>
<button onclick="resetGame()">Reset</button>

<canvas id="pitch" width="900" height="500"></canvas>

<script>
// =====================
// CORE SETUP
// =====================
const canvas = document.getElementById("pitch");
const ctx = canvas.getContext("2d");

// =====================
// PLAYER
// =====================
class Player {
  constructor(x, y, team) {
    this.x = x;
    this.y = y;
    this.team = team;
  }

  move(tx, ty) {
    this.x += (tx - this.x) * 0.06;
    this.y += (ty - this.y) * 0.06;
  }
}

// =====================
// BALL
// =====================
class Ball {
  constructor() {
    this.x = 450;
    this.y = 250;
    this.owner = null;
  }

  attach(player) {
    this.owner = player;
  }

  update() {
    if (this.owner) {
      this.x = this.owner.x;
      this.y = this.owner.y;
    }
  }
}

// =====================
// GAME STATE
// =====================
let blueTeam = [];
let redTeam = [];
let ball;

let blueScore = 0;
let redScore = 0;

// =====================
// INIT GAME
// =====================
function init() {
  blueTeam = [
    new Player(200, 200, "blue"),
    new Player(200, 250, "blue"),
    new Player(200, 300, "blue")
  ];

  redTeam = [
    new Player(700, 200, "red"),
    new Player(700, 250, "red"),
    new Player(700, 300, "red")
  ];

  ball = new Ball();
  ball.attach(blueTeam[0]);

  loop(); // 🔥 THIS WAS MISSING (CRITICAL FIX)
}

// =====================
// AI
// =====================
function updateAI() {
  blueTeam.forEach(p => p.move(ball.x, ball.y));
  redTeam.forEach(p => p.move(ball.x, ball.y));
}

// =====================
// COLLISION
// =====================
function checkPickup() {
  [...blueTeam, ...redTeam].forEach(p => {
    let dx = p.x - ball.x;
    let dy = p.y - ball.y;

    if (Math.hypot(dx, dy) < 14) {
      ball.attach(p);
    }
  });
}

// =====================
// GOALS
// =====================
function checkGoal() {
  if (ball.x > 880) {
    blueScore++;
    document.getElementById("blueScore").innerText = blueScore;
    init();
  }

  if (ball.x < 20) {
    redScore++;
    document.getElementById("redScore").innerText = redScore;
    init();
  }
}

// =====================
// DRAW
// =====================
function draw() {
  ctx.clearRect(0, 0, 900, 500);

  ctx.fillStyle = "#1e7f1e";
  ctx.fillRect(0, 0, 900, 500);

  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 5, 0, Math.PI * 2);
  ctx.fill();

  blueTeam.forEach(p => {
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fill();
  });

  redTeam.forEach(p => {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fill();
  });
}

// =====================
// LOOP
// =====================
function loop() {
  updateAI();
  ball.update();
  checkPickup();
  checkGoal();
  draw();

  requestAnimationFrame(loop);
}

// =====================
// RESET
// =====================
function resetGame() {
  blueScore = 0;
  redScore = 0;
  document.getElementById("blueScore").innerText = 0;
  document.getElementById("redScore").innerText = 0;
  init();
}

window.onload = init;

</script>

</body>
</html>
