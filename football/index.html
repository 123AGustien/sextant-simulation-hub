<!DOCTYPE html>
<html>
<head>
  <title>Triangle Football Lab</title>
</head>

<body style="margin:0; background:#111; color:white; font-family:Arial; text-align:center;">

<h2>⚽ Triangle Football Lab (4-3-3 Engine)</h2>

<div>
  Blue: <b id="blue">0</b> | Red: <b id="red">0</b>
</div>

<button onclick="startGame()">Start</button>
<button onclick="resetGame()">Reset</button>

<canvas id="c" width="900" height="500" style="background:#222; display:block; margin:10px auto;"></canvas>

<script>

// =====================
// CANVAS
// =====================
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// =====================
// WORLD (22 PLAYERS FIX)
// =====================
const World = {

  players: [

    // 🔵 BLUE TEAM (11)
    {x:100,y:80,team:"blue"},
    {x:100,y:140,team:"blue"},
    {x:100,y:200,team:"blue"},
    {x:100,y:260,team:"blue"},
    {x:100,y:320,team:"blue"},

    {x:220,y:100,team:"blue"},
    {x:220,y:200,team:"blue"},
    {x:220,y:300,team:"blue"},

    {x:340,y:150,team:"blue"},
    {x:340,y:250,team:"blue"},
    {x:340,y:350,team:"blue"},

    // 🔴 RED TEAM (11)
    {x:800,y:80,team:"red"},
    {x:800,y:140,team:"red"},
    {x:800,y:200,team:"red"},
    {x:800,y:260,team:"red"},
    {x:800,y:320,team:"red"},

    {x:680,y:100,team:"red"},
    {x:680,y:200,team:"red"},
    {x:680,y:300,team:"red"},

    {x:560,y:150,team:"red"},
    {x:560,y:250,team:"red"},
    {x:560,y:350,team:"red"}

  ],

  ball: {
    x:450,
    y:250,
    vx:0,
    vy:0,
    owner:null,

    update() {
      if (this.owner) {
        this.x = this.owner.x;
        this.y = this.owner.y;
      } else {
        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.98;
        this.vy *= 0.98;
      }
    },

    reset() {
      this.x = 450;
      this.y = 250;
      this.vx = 0;
      this.vy = 0;
      this.owner = null;
    },

    attach(p) {
      this.owner = p;
    }
  }
};

// =====================
// GAME STATE
// =====================
const Game = {
  blue:0,
  red:0,

  goal(team){

    if(team==="blue") Game.blue++;
    if(team==="red") Game.red++;

    document.getElementById("blue").innerText = Game.blue;
    document.getElementById("red").innerText = Game.red;

    World.ball.reset();
  }
};

// =====================
// PHYSICS
// =====================
const Physics = {

  goalLocked:false,

  update(){

    const ball = World.ball;

    ball.update();

    // POSSESSION SYSTEM
    World.players.forEach(p=>{

      const dx = p.x - ball.x;
      const dy = p.y - ball.y;
      const dist = Math.hypot(dx,dy);

      // pick up ball
      if(dist < 14 && !ball.owner){
        ball.attach(p);
      }

      // release ball
      if(ball.owner === p && dist > 25){
        ball.owner = null;
      }
    });

    // GOALS
    if(!Physics.goalLocked){

      if(ball.x > 880){
        Physics.goalLocked = true;
        Game.goal("blue");
        setTimeout(()=>Physics.goalLocked=false,400);
      }

      if(ball.x < 20){
        Physics.goalLocked = true;
        Game.goal("red");
        setTimeout(()=>Physics.goalLocked=false,400);
      }
    }
  }
};

// =====================
// RENDER
// =====================
function draw(){

  ctx.clearRect(0,0,900,500);

  // players
  World.players.forEach(p=>{
    ctx.fillStyle = p.team === "blue" ? "cyan" : "red";

    ctx.beginPath();
    ctx.arc(p.x,p.y,8,0,Math.PI*2);
    ctx.fill();
  });

  // ball
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(World.ball.x,World.ball.y,6,0,Math.PI*2);
  ctx.fill();
}

// =====================
// LOOP
// =====================
let running = false;

function loop(){

  if(!running) return;

  Physics.update();
  draw();

  requestAnimationFrame(loop);
}

// =====================
// CONTROLS
// =====================
function startGame(){
  if(running) return;
  running = true;
  loop();
}

function resetGame(){
  Game.blue = 0;
  Game.red = 0;

  document.getElementById("blue").innerText = 0;
  document.getElementById("red").innerText = 0;

  World.ball.reset();
}

</script>

</body>
</html>
