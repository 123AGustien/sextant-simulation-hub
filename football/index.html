<!DOCTYPE html>
<html>
<head>
  <title>Triangle Football Lab</title>

  <style>
    body {
      margin: 0;
      background: #0b3d0b;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    canvas {
      background: #1e7f1e;
      display: block;
      margin: auto;
      border: 3px solid white;
    }
  </style>
</head>

<body>

<h1>Triangle Football Lab</h1>
<div>Blue: <span id="b">0</span> | Red: <span id="r">0</span></div>

<canvas id="c" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let blue = 0, red = 0;

// ---------------- BALL ----------------
class Ball {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = 450;
    this.y = 250;
    this.vx = 0;
    this.vy = 0;
    this.owner = null;
  }

  update() {
    if (this.owner) {
      this.x = this.owner.x;
      this.y = this.owner.y;
      return;
    }

    this.x += this.vx;
    this.y += this.vy;

    this.vx *= 0.98;
    this.vy *= 0.98;
  }
}

// ---------------- PLAYER ----------------
class Player {
  constructor(x, y, team) {
    this.x = x;
    this.y = y;
    this.team = team;
  }

  move(tx, ty) {
    this.x += (tx - this.x) * 0.06;
    this.y += (ty - this.y) * 0.06;
  }
}

const ball = new Ball();

const players = [];
for (let i = 0; i < 3; i++) {
  players.push(new Player(200, 150 + i * 80, "blue"));
  players.push(new Player(700, 150 + i * 80, "red"));
}

// ---------------- AI ----------------
function ai(p) {

  // if has ball → go toward goal
  if (ball.owner === p) {
    const goalX = p.team === "blue" ? 900 : 0;
    const goalY = 250;

    p.move(goalX, goalY);

    if (Math.random() < 0.02) {
      ball.owner = null;
      ball.vx = (p.team === "blue" ? 6 : -6);
      ball.vy = (Math.random() - 0.5) * 3;
    }
    return;
  }

  // otherwise chase ball
  p.move(ball.x, ball.y);

  let dx = p.x - ball.x;
  let dy = p.y - ball.y;

  if (Math.hypot(dx, dy) < 15 && !ball.owner) {
    ball.owner = p;
  }
}

// ---------------- GOAL ----------------
function goalCheck() {
  if (ball.x < 10) {
    blue++;
    reset();
  }

  if (ball.x > 890) {
    red++;
    reset();
  }
}

function reset() {
  ball.reset();
  document.getElementById("b").innerText = blue;
  document.getElementById("r").innerText = red;
}

// ---------------- DRAW ----------------
function draw() {
  ctx.fillStyle = "#1e7f1e";
  ctx.fillRect(0,0,900,500);

  ctx.fillStyle = "white";
  ctx.fillRect(449,0,2,500);

  ctx.beginPath();
  ctx.fillStyle = "white";
  ctx.arc(ball.x, ball.y, 5, 0, Math.PI*2);
  ctx.fill();

  players.forEach(p => {
    ctx.fillStyle = p.team === "blue" ? "cyan" : "red";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();
  });
}

// ---------------- LOOP ----------------
function loop() {
  players.forEach(ai);
  ball.update();
  goalCheck();
  draw();

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
