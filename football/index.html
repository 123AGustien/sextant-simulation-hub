<!DOCTYPE html>
<html>
<head>
  <title>AI Football Stadium</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #050a07;
      color: white;
      overflow: hidden;
    }

    /* =========================
       STADIUM LANDING SCREEN
    ========================== */
    #menu {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #0f3d1f, #020503);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .sub {
      margin-top: 10px;
      opacity: 0.7;
    }

    .live {
      margin-top: 20px;
      color: red;
      font-weight: bold;
      letter-spacing: 3px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      cursor: pointer;
      background: #1db954;
      color: white;
      border-radius: 8px;
    }

    button:hover {
      background: #17a44a;
    }

    /* =========================
       CANVAS STADIUM
    ========================== */
    canvas {
      display: block;
      margin: auto;
      background: #145c2c;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      font-size: 18px;
    }
  </style>
</head>

<body>

<!-- =========================
     STADIUM MENU
========================== -->
<div id="menu">
  <div class="title">⚽ AI FOOTBALL STADIUM</div>
  <div class="live">● LIVE SIMULATION</div>
  <div class="sub">22 Player Autonomous Match Engine</div>
  <button onclick="startMatch()">START MATCH</button>
</div>

<!-- HUD -->
<div id="hud">
  Blue: <b id="blue">0</b> | Red: <b id="red">0</b>
</div>

<canvas id="c" width="900" height="500"></canvas>

<script>

// =========================
// GAME STATE
// =========================
const Game = { blue:0, red:0 };

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// =========================
// BALL
// =========================
const Ball = {
  x:450, y:250,
  vx:0, vy:0,
  owner:null,

  update(){
    if(this.owner){
      this.x = this.owner.x;
      this.y = this.owner.y;
    } else {
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.95;
      this.vy *= 0.95;
    }
  },

  reset(){
    this.x=450; this.y=250;
    this.vx=0; this.vy=0;
    this.owner=null;
  }
};

// =========================
// PLAYERS (22 AI)
// =========================
const Players = [];

function init(){

  Players.length = 0;

  // BLUE TEAM
  for(let i=0;i<11;i++){
    Players.push({
      x:100,
      y:50+i*40,
      team:"blue",
      role: i<4?"def":i<7?"mid":"att",
      speed:1+Math.random()*0.4
    });
  }

  // RED TEAM
  for(let i=0;i<11;i++){
    Players.push({
      x:800,
      y:50+i*40,
      team:"red",
      role: i<4?"def":i<7?"mid":"att",
      speed:1+Math.random()*0.4
    });
  }
}

// =========================
// AI LOGIC
// =========================
function ai(p){

  const dx = Ball.x - p.x;
  const dy = Ball.y - p.y;
  const d = Math.hypot(dx,dy);

  let tx = Ball.x;
  let ty = Ball.y;

  // role logic
  if(p.role==="def"){
    tx = p.team==="blue" ? Math.min(Ball.x-80, p.x) : Math.max(Ball.x+80, p.x);
  }

  if(p.role==="att"){
    tx = p.team==="blue" ? Ball.x+40 : Ball.x-40;
  }

  p.x += (tx - p.x)*0.03*p.speed;
  p.y += (ty - p.y)*0.03*p.speed;

  // possession
  if(d<14 && !Ball.owner){
    Ball.owner = p;
  }

  // release / pass
  if(Ball.owner===p && Math.random()<0.01){
    Ball.owner=null;
    Ball.vx=(Math.random()-0.5)*4;
    Ball.vy=(Math.random()-0.5)*4;
  }
}

// =========================
// UPDATE
// =========================
function update(){

  Ball.update();
  Players.forEach(ai);

  if(Ball.x>880){
    Game.blue++;
    document.getElementById("blue").innerText=Game.blue;
    Ball.reset();
  }

  if(Ball.x<20){
    Game.red++;
    document.getElementById("red").innerText=Game.red;
    Ball.reset();
  }
}

// =========================
// RENDER
// =========================
function draw(){

  ctx.clearRect(0,0,900,500);

  // pitch
  ctx.fillStyle="#145c2c";
  ctx.fillRect(0,0,900,500);

  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(450,0);
  ctx.lineTo(450,500);
  ctx.stroke();

  // players
  Players.forEach(p=>{
    ctx.fillStyle = p.team==="blue" ? "#4dd2ff" : "#ff4d4d";
    ctx.beginPath();
    ctx.arc(p.x,p.y,7,0,Math.PI*2);
    ctx.fill();
  });

  // ball
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(Ball.x,Ball.y,6,0,Math.PI*2);
  ctx.fill();
}

// =========================
// LOOP
// =========================
let running=false;

function loop(){
  if(!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

// =========================
// START MATCH (UI → GAME)
// =========================
function startMatch(){

  document.getElementById("menu").style.display="none";

  init();
  running=true;
  loop();
}

</script>

</body>
</html>
