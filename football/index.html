<!DOCTYPE html>
<html>
<head>
  <title>Triangle Football Lab</title>

  <style>
    body {
      margin: 0;
      background: #0b3d0b;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin: 10px;
    }

    canvas {
      background: #1e7f1e;
      border: 3px solid white;
      display: block;
      margin: auto;
    }

    .ui {
      margin: 10px;
    }

    button {
      padding: 8px 16px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Triangle Football Lab</h1>

<div class="ui">
  Blue: <span id="blueScore">0</span> |
  Red: <span id="redScore">0</span>
</div>

<button onclick="startMatch()">Start</button>
<button onclick="resetMatch()">Reset</button>

<canvas id="pitch" width="900" height="500"></canvas>

<script>
// =====================
// CORE ENGINE (SAFE)
// =====================

let canvas = document.getElementById("pitch");
let ctx = canvas.getContext("2d");

let blueTeam = [];
let redTeam = [];
let ball;

let blueScore = 0;
let redScore = 0;

// ---------------------
// PLAYER
// ---------------------
class Player {
  constructor(x, y, team) {
    this.x = x;
    this.y = y;
    this.team = team;
  }

  move(tx, ty) {
    this.x += (tx - this.x) * 0.06;
    this.y += (ty - this.y) * 0.06;
  }
}

// ---------------------
// BALL
// ---------------------
class Ball {
  constructor() {
    this.x = 450;
    this.y = 250;
    this.owner = null;
  }

  attach(player) {
    this.owner = player;
  }

  update() {
    if (this.owner) {
      this.x = this.owner.x;
      this.y = this.owner.y;
    }
  }
}

// ---------------------
// DISTANCE
// ---------------------
function distance(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ---------------------
// INIT TEAMS
// ---------------------
function init() {
  blueTeam = [
    new Player(200, 200, "blue"),
    new Player(200, 250, "blue"),
    new Player(200, 300, "blue")
  ];

  redTeam = [
    new Player(700, 200, "red"),
    new Player(700, 250, "red"),
    new Player(700, 300, "red")
  ];

  ball = new Ball();
  ball.attach(blueTeam[0]);
}

// ---------------------
// SIMPLE BLUE TACTIC
// ---------------------
function blueTactic() {
  let carrier = ball.owner || blueTeam[0];

  blueTeam[0].move(carrier.x, carrier.y);
  blueTeam[1].move(carrier.x + 60, carrier.y - 40);
  blueTeam[2].move(carrier.x + 60, carrier.y + 40);
}

// ---------------------
// SIMPLE RED PRESSURE
// ---------------------
function redTactic() {
  let closest = redTeam.reduce((a, b) =>
    distance(b, ball) < distance(a, ball) ? b : a
  );

  closest.move(ball.x, ball.y);

  redTeam.forEach(p => {
    if (p !== closest) {
      p.move(ball.x + 40, ball.y + 20);
    }
  });
}

// ---------------------
// UPDATE
// ---------------------
function update() {
  blueTactic();
  redTactic();

  ball.update();

  // interception
  [...blueTeam, ...redTeam].forEach(p => {
    if (distance(p, ball) < 14) {
      ball.attach(p);
    }
  });

  // goals
  if (ball.x > 880) goal("blue");
  if (ball.x < 20) goal("red");
}

// ---------------------
// DRAW
// ---------------------
function draw() {
  ctx.clearRect(0, 0, 900, 500);

  // pitch
  ctx.fillStyle = "#1e7f1e";
  ctx.fillRect(0, 0, 900, 500);

  // center line
  ctx.strokeStyle = "white";
  ctx.beginPath();
  ctx.moveTo(450, 0);
  ctx.lineTo(450, 500);
  ctx.stroke();

  // ball
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, 5, 0, Math.PI * 2);
  ctx.fill();

  drawTeam(blueTeam, "blue");
  drawTeam(redTeam, "red");
}

// ---------------------
// DRAW TEAM
// ---------------------
function drawTeam(team, color) {
  ctx.fillStyle = color;

  team.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ---------------------
// GOAL
// ---------------------
function goal(team) {
  if (team === "blue") blueScore++;
  if (team === "red") redScore++;

  document.getElementById("blueScore").innerText = blueScore;
  document.getElementById("redScore").innerText = redScore;

  init();
}

// ---------------------
// LOOP
// ---------------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ---------------------
// CONTROL (SAFE START)
// ---------------------
function startMatch() {
  init();
  loop();
}

// auto-safe start (IMPORTANT FIX)
window.onload = () => {
  init();
  loop();
};

function resetMatch() {
  blueScore = 0;
  redScore = 0;

  document.getElementById("blueScore").innerText = 0;
  document.getElementById("redScore").innerText = 0;

  init();
}

</script>

</body>
</html>
