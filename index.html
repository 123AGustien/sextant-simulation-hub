<!DOCTYPE html>
<html>
<head>
  <title>Football Simulation Engine</title>
</head>

<body style="margin:0; background:#111; color:white; font-family:Arial; text-align:center;">

  <h1>⚽ Triangle Football Lab (4-3-3 Engine)</h1>

  <div>
    <span>Blue: <b id="blueScore">0</b></span> |
    <span>Red: <b id="redScore">0</b></span>
  </div>

  <br>

  <button onclick="startGame()">Start</button>
  <button onclick="resetGame()">Reset</button>

  <hr>

  <canvas id="game" width="900" height="500" style="background:#222;"></canvas>

  <script>
    // =====================
    // WORLD SETUP
    // =====================
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const World = {
      players: [
        {x:100,y:200}, {x:200,y:300}, {x:300,y:200}
      ],
      ball: {
        x:450,y:250,
        vx:0,vy:0,
        owner:null,

        update() {
          if (!this.owner) {
            this.x += this.vx;
            this.y += this.vy;

            this.vx *= 0.98;
            this.vy *= 0.98;
          } else {
            this.x = this.owner.x;
            this.y = this.owner.y;
          }
        },

        attach(p) {
          this.owner = p;
        }
      }
    };

    // =====================
    // GAME STATE
    // =====================
    const Game = {
      blue: 0,
      red: 0,

      goal(team) {
        if (team === "blue") Game.blue++;
        if (team === "red") Game.red++;

        document.getElementById("blueScore").innerText = Game.blue;
        document.getElementById("redScore").innerText = Game.red;

        World.ball.x = 450;
        World.ball.y = 250;
        World.ball.owner = null;
        World.ball.vx = 0;
        World.ball.vy = 0;
      }
    };

    // =====================
    // PHYSICS ENGINE (COMPLETE)
    // =====================
    const Physics = {

      goalLocked: false,

      update() {
        const ball = World.ball;

        ball.update();

        // POSSESSION
        World.players.forEach(p => {

          const dx = p.x - ball.x;
          const dy = p.y - ball.y;
          const dist = Math.hypot(dx, dy);

          if (dist < 14 && !ball.owner) {
            ball.attach(p);
          }

          if (ball.owner === p && dist > 25) {
            ball.owner = null;
          }
        });

        // GOALS
        if (!Physics.goalLocked) {

          if (ball.x > 880) {
            Physics.goalLocked = true;
            Game.goal("blue");
            setTimeout(()=>Physics.goalLocked=false, 400);
          }

          if (ball.x < 20) {
            Physics.goalLocked = true;
            Game.goal("red");
            setTimeout(()=>Physics.goalLocked=false, 400);
          }
        }
      }
    };

    // =====================
    // RENDER LOOP
    // =====================
    function draw() {
      ctx.clearRect(0,0,900,500);

      // players
      ctx.fillStyle="cyan";
      World.players.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,10,0,Math.PI*2);
        ctx.fill();
      });

      // ball
      ctx.fillStyle="white";
      ctx.beginPath();
      ctx.arc(World.ball.x,World.ball.y,6,0,Math.PI*2);
      ctx.fill();
    }

    function loop() {
      Physics.update();
      draw();
      requestAnimationFrame(loop);
    }

    // =====================
    // CONTROLS
    // =====================
    function startGame() {
      loop();
      console.log("⚽ Game Started");
    }

    function resetGame() {
      Game.blue = 0;
      Game.red = 0;
      document.getElementById("blueScore").innerText = 0;
      document.getElementById("redScore").innerText = 0;

      World.ball.x = 450;
      World.ball.y = 250;
      World.ball.owner = null;
    }

  </script>

</body>
</html>
